{% extends 'layouts/base_sidebar.html' %}
{% load i18n %}
{% block sidebar_content %}
<div class="flex flex-row w-full justify-between! md:flex-col gap-y-1
            [&>*]:font-semibold [&>div]:px-3 md:[&>div]:px-2 [&>div]:py-2 md:[&>div]:py-1 [&>div]:rounded-md
            [&>div>a]:flex [&>div>a]:flex-row [&>div>a]:items-center [&>div>a]:gap-x-2
            [&>div]:hover:bg-slate-200 dark:[&>div]:hover:bg-slate-700">
    <div>
        <a href="{% url 'pdf_overview' %}">
            {% include 'includes/svg/back.html' %}
            <span class="hidden md:block">{% trans 'Back to App' %}</span>
        </a>
    </div>
    <div {% if page == 'user_overview' %} class="bg-slate-200 md:bg-slate-100 dark:bg-slate-800" {% endif %}>
        <a href="{% url 'user_overview' %}">
            {% include 'includes/svg/user.html' %}
            <span class="hidden md:block">{% trans 'Users' %}</span>
        </a>
    </div>
    <div {% if page == 'instance_info' %} class="bg-slate-200 md:bg-slate-100 dark:bg-slate-800" {% endif %}>
        <a href="{% url 'instance_info' %}">
            <svg fill="currentColor" class="w-5 h-5" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <!-- source: https://www.svgrepo.com/svg/66446/stats -->
                <!-- license: CC0 License-->

                <path d="M480.6,460.2H51.8V31.4c0-11.3-9.1-20.4-20.4-20.4S11,20.1,11,31.4v449.2c0,11.3,9.1,20.4,20.4,20.4h449.2    c11.3,0,20.4-9.1,20.4-20.4C501,469.3,491.9,460.2,480.6,460.2z"/>
            </svg>
            <span class="hidden md:block">{% trans 'Information' %}</span>
        </a>
    </div>
</div>
{% endblock %}
