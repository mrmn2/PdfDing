{% load i18n %}
<div class="flex flex-wrap gap-x-2 gap-y-2 pt-3">
    <div class="flex items-center text-slate-500 dark:text-slate-300 text-sm">
      <span>{% trans 'Filters' %}</span>
    </div>
    {% if search_query %}
    <div id="search_filter" x-data="{}"
         class="flex items-center px-2 py-1 text-sm rounded-md gap-x-1
                bg-slate-200 text-slate-700 dark:text-slate-300 dark:bg-slate-700
                border border-slate-400/70 dark:border-slate-500">
        <div class="flex flex-row items-center">
            <svg class="w-4 h-4 mt-[1px]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!--source: https://www.svgrepo.com/svg/489122/search -->
                <!--License: PD-->
                <path d="M13.3891 13.3891L19 19M9.5 15C12.5376 15 15 12.5376 15 9.5C15 6.46243 12.5376 4 9.5 4C6.46243 4 4 6.46243 4 9.5C4 12.5376 6.46243 15 9.5 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>{{ search_query|truncatechars:40 }}</span>
        </div>
        <div class="dark:hover:text-white hover:text-black hover:cursor-pointer"
             @click="window.open('{% url 'user_overview_query' %}?search=', '_self');">
            <svg id="search_filter_close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" class="w-4 h-auto">
                <path d="M18 7 6 19"></path>
                <path d="m6 7 12 12"></path>
            </svg>
        </div>
    </div>
    {% endif %}
    {% for tag in tag_query %}
    <div id="tag_{{ tag }}_filter" x-data="{}"
         class="flex items-center px-2 py-1 text-sm rounded-md gap-x-1
                bg-slate-200 text-slate-700 dark:text-slate-300 dark:bg-slate-700
                border border-slate-400/70 dark:border-slate-500">
        <span>#{{ tag|truncatechars:40 }}</span>
        <div class="dark:hover:text-white hover:text-black hover:cursor-pointer"
             @click="window.open('{% url 'user_overview_query' %}?remove={{ tag }}', '_self');">
            <svg id="tag_{{ tag }}_filter_close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" class="w-4 h-auto">
                <path d="M18 7 6 19"></path>
                <path d="m6 7 12 12"></path>
            </svg>
        </div>
    </div>
    {% endfor %}
</div>
