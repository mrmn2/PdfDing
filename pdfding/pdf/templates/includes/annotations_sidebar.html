{% extends 'layouts/base_sidebar.html' %}
{% load i18n %}
{% block sidebar_content %}
<div class="flex flex-row w-full justify-between! md:flex-col gap-y-1
            [&>*]:font-semibold [&>div]:px-3 md:[&>div]:px-2 [&>div]:py-2 md:[&>div]:py-1 [&>div]:rounded-md
            [&>div>a]:flex [&>div>a]:flex-row [&>div>a]:items-center [&>div>a]:gap-x-2
            [&>div]:hover:bg-slate-200 dark:[&>div]:hover:bg-slate-700">
    <div>
        <a href="{% url 'pdf_overview' %}">
            <svg class="w-5 h-5" fill="currentColor" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400.004 400.004" xml:space="preserve">
            {% include 'includes/svg/back.html' %}
            <span class="hidden md:block">{% trans 'Back to App' %}</span>
        </a>
    </div>
    <div {% if page == 'pdf_highlight_overview' %} class="bg-slate-200 md:bg-slate-100 dark:bg-slate-800" {% endif %}>
        <a href="{% url 'pdf_highlight_overview' %}">
            {% include 'includes/svg/annotation.html' %}
            <span class="hidden md:block">{% trans 'Highlights' %}</span>
        </a>
    </div>
    <div {% if page == 'pdf_comment_overview' %} class="bg-slate-200 md:bg-slate-100 dark:bg-slate-800" {% endif %}>
        <a href="{% url 'pdf_comment_overview' %}">
            {% include 'includes/svg/comment.html' %}
            <span class="hidden md:block">{% trans 'Comments' %}</span>
        </a>
    </div>
</div>
{% endblock %}
