{% load i18n %}
<div id="delete_workspace_modal" class="rounded-2xl drop-shadow-2xl shadow-black w-full py-4
            bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700">
    <div class="px-4">
      <h2 class="pb-2">{% blocktrans %} Delete {{ workspace_name }} {% endblocktrans %}</h2>
      <div>{% trans 'Are you sure you want to delete this workspace and all its collections and PDFs? This action cannot be reversed!' %}</div>
        <div class="pt-4 flex gap-x-2">
            <button id="confirm_delete" class="flex! items-center justify-center py-1! px-1 bg-red-500! hover:bg-red-600!"
                    hx-delete="{% url 'delete_workspace' workspace_id %}"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
              {% trans 'Submit' %}
            </button>
            <div id="cancel_delete" @click="show_delete_workspace_modal = false"
                 class="flex! items-center font-semibold text-red-500 border-2 border-red-500 rounded-md cursor-pointer hover:bg-red-500 hover:text-white">
              <span class="px-1">{% trans 'Cancel' %}</span>
            </div>
        </div>
    </div>
</div>
