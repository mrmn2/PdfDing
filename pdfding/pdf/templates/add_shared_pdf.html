{% extends 'layouts/box.html' %}
{% load i18n %}

{% block content %}

<h1>Share PDF</h1>
<h2 class="mb-6 truncate">{{ pdf_name }}</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" >{% trans 'Submit' %}</button>
</form>

{% endblock %}
