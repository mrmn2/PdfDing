{% extends 'layouts/blank.html' %}
{% load i18n %}

{% block content %}
{% trans 'Edit' as edit %}
<div x-data="{ show_delete_modal: false }">
  <div class="flex flex-col md:flex-row md:justify-end"
      :class="{ 'opacity-15': show_delete_modal }">
      <div class="w-full! md:w-72! lg:w-72! px-2 md:px-4 pt-2">
        {% include sidebar_name with page=page %}
      </div>
      <div class="flex w-full justify-center items-center py-2 px-2 md:px-8">
          <div class="rounded-md w-full min-[1200px]:w-3xl! md:ml-10 min-[1400px]:ml-0! px-4 py-4 md:pb-4 border
                      bg-slate-100 dark:bg-slate-800 border-slate-300 dark:border-slate-700">
            {% block inner_content %}
            {% endblock %}
          </div>
      </div>
  </div>
  <div x-show="show_delete_modal" x-cloak
      @click.away="show_delete_modal = false"
      @keyup.escape.window="show_delete_modal = false"
      class="fixed inset-x-0 top-40 mx-auto my-auto w-80! lg:w-[28rem]! z-20">
      <div id="delete_modal"></div>
  </div>
</div>
{% endblock %}
